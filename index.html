<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dynamic Music Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 0.8s ease; 
            background: #121212;
        }
        .player {
            background: rgba(24, 24, 24, 0.6);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            text-align: center;
            width: 320px;
            border: 1px solid rgba(40, 40, 40, 0.5);
            backdrop-filter: blur(10px);
        }
        #album-art {
            width: 280px;
            height: 280px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .track-info h2 { 
            margin: 10px 0 5px; 
            font-size: 1.4rem; 
            font-weight: 600; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-info p { 
            margin: 0 0 25px; 
            color: #b3b3b3; 
            font-size: 0.9rem; 
        }
        
        /* Duration Bar / Seekbar Styling */
        .progress-container {
            width: 100%;
            margin-bottom: 25px;
        }
        .progress-bar {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #b3b3b3;
            margin-top: 6px;
        }

        /* Spotify Style Controls Layout */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 15px;
        }
        .control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: transform 0.2s;
        }
        .control-btn:active {
            transform: scale(0.9);
        }
        .nav-icon {
            font-size: 2.2rem;
        }
        
        /* White Circular Play Button */
        #play-btn { 
            background: white;
            color: black;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="player">
    <img id="album-art" src="1.jpg" alt="Album Art">
    
    <div class="track-info">
        <h2 id="title">Loading...</h2>
        <p id="artist">Loading...</p>
    </div>
    
    <div class="progress-container">
        <input type="range" id="progress" class="progress-bar" min="0" max="100" value="0" oninput="seekTrack()">
        <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn nav-icon" onclick="prevTrack()">⏮</button>
        <button class="control-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="control-btn nav-icon" onclick="nextTrack()">⏭</button>
    </div>

    <audio id="audio-player"></audio>
</div>

<script>
    // आपकी बताई हुई गानों की पूरी लिस्ट यहाँ सेट कर दी गई है
    const playlist = [
        { title: "Namo Namo", artist: "Amit Trivedi", audio: "1.mp3", art: "1.jpg", color: "#613a27" },
        { title: "Tu Aake Dekhle", artist: "King", audio: "2.mp3", art: "2.jpg", color: "#1c3c5c" },
        { title: "Hanuman Chalisa", artist: "GowraHari", audio: "3.mp3", art: "3.jpg", color: "#662d14" },
        { title: "Aaramabh Hai Prachand", artist: "Shrylox", audio: "4.mp3", art: "4.jpg", color: "#4a1212" },
        { title: "Chal Diye Tum Kahan", artist: "AURO", audio: "5.mp3", art: "5.jpg", color: "#1a403a" },
        { title: "Saathi", artist: "Atif Aslam", audio: "6.mp3", art: "6.jpg", color: "#2b2240" },
        { title: "Tera Fitoor", artist: "Arijit Singh", audio: "7.mp3", art: "7.jpg", color: "#471833" },
        { title: "Tere Sang Yaara", artist: "Atif Aslam", audio: "8.mp3", art: "8.jpg", color: "#19354a" }
    ];

    let currentTrackIndex = 0;
    let isPlaying = false;

    const audio = document.getElementById('audio-player');
    const art = document.getElementById('album-art');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const playBtn = document.getElementById('play-btn');
    const progress = document.getElementById('progress');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');

    function loadTrack(index) {
        const track = playlist[index];
        title.innerText = track.title;
        artist.innerText = track.artist;
        art.src = track.art;
        audio.src = track.audio;
        
        // डायनामिक बैकग्राउंड चेंज
        document.body.style.background = `linear-gradient(to bottom, ${track.color} 0%, #121212 100%)`;
        
        resetProgress();
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.innerText = "▶";
        } else {
            audio.play().catch(err => console.log("Playback interaction restriction"));
            playBtn.innerText = "⏸";
        }
        isPlaying = !isPlaying;
    }

    function nextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        loadTrack(currentTrackIndex);
        if (isPlaying) audio.play();
    }

    function prevTrack() {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        loadTrack(currentTrackIndex);
        if (isPlaying) audio.play();
    }

    function resetProgress() {
        progress.value = 0;
        currentTimeEl.innerText = "0:00";
        durationEl.innerText = "0:00";
    }

    function formatTime(time) {
        if (isNaN(time)) return "0:00";
        const mins = Math.floor(time / 60);
        const secs = Math.floor(time % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            progress.value = progressPercent;
            currentTimeEl.innerText = formatTime(audio.currentTime);
            durationEl.innerText = formatTime(audio.duration);
        }
    });

    audio.addEventListener('loadedmetadata', () => {
        durationEl.innerText = formatTime(audio.duration);
    });

    audio.addEventListener('ended', nextTrack);

    function seekTrack() {
        if (audio.duration) {
            const seekTo = (progress.value / 100) * audio.duration;
            audio.currentTime = seekTo;
        }
    }

    loadTrack(currentTrackIndex);
</script>

</body>
</html>
